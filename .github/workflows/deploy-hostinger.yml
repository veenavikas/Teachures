name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            cd /home/u853354115/domains/lavenderblush-jellyfish-375463.hostingersite.com/nodejs
            
            # Force update from main branch to prevent merge conflicts
            git fetch origin main
            git reset --hard origin/main
            
            # Install new packages
            npm install
            
            # Restart the server (this varies depending on Hostinger setup, assuming PM2 is used if SSH is available)
            pm2 restart all || true
